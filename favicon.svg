    <line x1="-4.8" y1="-2.5" x2="-3.3" y2="-1.7" stroke="#F6B40E" stroke-width="0.5"/>
    <line x1="-4.8" y1="2.5" x2="-3.3" y2="1.7" stroke="#F6B40E" stroke-width="0.5"/>
